<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE COMMANDER</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="text-center p-10 border-2 border-zinc-800 rounded-[3rem] bg-zinc-900/50 max-w-sm w-full">
        <p id="label" class="text-zinc-600 text-[10px] font-black uppercase tracking-widest mb-4">Radio Status</p>
        <p id="m" class="text-4xl font-black italic uppercase text-zinc-700 transition-all">Waiting...</p>
    </div>

    <script>
        // 1. CONEXIÓN FORZADA
        const pusher = new Pusher('284fc98940a4b6d4c359', { 
            cluster: 'us2',
            forceTLS: true 
        });

        // 2. SUSCRIPCIÓN AL CANAL
        const channel = pusher.subscribe("test-channel");

        // Confirmar conexión en pantalla
        pusher.connection.bind('connected', () => {
            document.getElementById('label').innerText = "ONLINE - READY FOR DR";
            document.getElementById('label').className = "text-green-500 text-[10px] font-black uppercase tracking-widest mb-4";
        });

        // 3. ESCUCHA ACTIVA DEL EVENTO
        channel.bind('test-event', function(data) {
            // No importa si viene como 'text' o 'message', lo atrapamos
            const msg = data.text || data.message || "INSTRUCCIÓN RECIBIDA";
            
            const display = document.getElementById('m');
            display.innerText = msg;
            display.className = "text-4xl font-black italic uppercase text-[#ccff00] animate-pulse";
            
            // Alerta visual agresiva para estar seguros
            document.body.style.backgroundColor = "#001a1a";
        });

        // Si hay error de conexión, avísame
        pusher.connection.bind('error', function(err) {
            document.getElementById('label').innerText = "CONNECTION ERROR";
            document.getElementById('label').className = "text-red-500 text-[10px] font-black uppercase tracking-widest mb-4";
        });
    </script>
</body>
</html>
