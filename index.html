<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE COMMANDER</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

    <div class="text-center p-10 border-2 border-zinc-800 rounded-[3rem] bg-zinc-900/50 max-w-sm w-full">
        <p id="label" class="text-zinc-600 text-[10px] font-black uppercase tracking-widest mb-4 text-center">Status: Listening...</p>
        
        <p id="m" class="text-4xl font-black italic uppercase text-zinc-700 transition-all duration-500">
            Waiting for Dr...
        </p>
    </div>

    <script>
        // 2. Sintonizamos la radio con tu llave
        const pusher = new Pusher('284fc98940a4b6d4c359', { 
            cluster: 'us2',
            forceTLS: true 
        });

        // 3. Nos conectamos al canal exacto que usa tu relay.js
        const channel = pusher.subscribe("test-channel");

        // 4. Reaccionamos cuando el Dr. envía el evento
        channel.bind('test-event', function(data) {
            console.log("¡LLEGÓ ALGO!", data);
            
            // Extraemos el texto (tu relay envía 'text')
            const textoRecibido = data.text || data.message;
            
            if(textoRecibido) {
                const display = document.getElementById('m');
                const label = document.getElementById('label');
                
                // Actualizamos la pantalla al instante
                display.innerText = textoRecibido;
                display.className = "text-4xl font-black italic uppercase text-[#ccff00] animate-pulse";
                label.innerText = "NEW INSTRUCTION RECEIVED:";
                label.className = "text-blue-400 text-[10px] font-black uppercase mb-4";
                
                // Vibración para avisar al paciente
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
        });

        // Verificador para saber si estamos conectados (míralo en F12)
        pusher.connection.bind('connected', () => {
            console.log("CONECTADO A PUSHER - LISTO PARA RECIBIR");
        });
    </script>
</body>
</html>
