<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE COMMANDER</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div id="card" class="text-center p-12 border-2 border-zinc-800 rounded-[4rem] bg-zinc-900/20 max-w-sm w-full mx-4">
        <p id="m" class="text-4xl font-black italic uppercase text-zinc-500">Waiting for Dr...</p>
    </div>

    <script>
        // FORZAMOS LA CONEXIÓN MANUAL
        const pusher = new Pusher('284fc98940a4b6d4c359', { 
            cluster: 'us2',
            forceTLS: true 
        });

        const channel = pusher.subscribe("test-channel");

        // AUDITORÍA: Escuchar 'test-event' que es lo que envía tu relay.js
        channel.bind('test-event', function(data) {
            console.log("¡DATA RECIBIDA!", data);
            
            // Si el mensaje llega, esta ventana saltará en tu celular/PC:
            alert("INSTRUCCIÓN RECIBIDA: " + (data.text || data.message));

            const mainMsg = document.getElementById('m');
            mainMsg.innerText = data.text || data.message;
            mainMsg.className = "text-4xl font-black italic uppercase text-[#ccff00] animate-pulse";
            document.body.style.backgroundColor = "#001a1a";
        });

        pusher.connection.bind('connected', () => {
            console.log("¡ESTAMOS ONLINE EN PUSHER!");
        });
    </script>
</body>
</html>
