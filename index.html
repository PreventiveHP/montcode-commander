<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MONTCODE COMMANDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-8 font-sans flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md mt-12">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="text-[#ccff00] text-2xl font-black italic tracking-tighter uppercase">Command Station</h1>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
            
            <label class="text-[9px] text-zinc-500 font-black uppercase tracking-[0.3em] block mb-4">
                Clinical Instruction:
            </label>
            
            <input type="text" id="clinicalNote" 
                class="w-full bg-black border-2 border-zinc-800 rounded-2xl p-5 text-xl text-[#ccff00] font-black outline-none focus:border-blue-500 mb-6 uppercase" 
                placeholder="Ex: LOSARTAN 50MG">

            <button onclick="pushCommand()" id="sendBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-xs shadow-lg active:scale-95">
                Transmit to Terminal
            </button>

            <div class="mt-6 border-t border-zinc-800 pt-4 text-center">
                <p id="status-text" class="text-zinc-700 font-bold text-[8px] uppercase tracking-[0.4em] italic">Status: Link Ready</p>
            </div>
        </div>
    </div>

    <script>
        async function pushCommand() {
            const val = document.getElementById('clinicalNote').value;
            if(!val) return;
            
            const status = document.getElementById('status-text');
            const btn = document.getElementById('sendBtn');
            
            status.innerText = "TRANSMITTING...";
            btn.disabled = true;

            try {
                // Llama a la carpeta /api/pusher-relay.js que creaste
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });

                if (response.ok) {
                    status.innerText = "COMMAND DELIVERED ✅";
                    document.getElementById('clinicalNote').value = "";
                } else {
                    status.innerText = "RELAY ERROR ❌";
                }
            } catch (e) {
                status.innerText = "CONNECTION FAILED ❌";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
