 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MONTCODE COMMANDER - PACIENTE</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animación mejorada de la cápsula */
        .pill-anim { animation: bounce 1s infinite; font-size: 80px; filter: drop-shadow(0 0 20px #00ffff); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        /* Fondo de alerta médica */
        .bg-med { background-color: #001a1a !important; border: 4px solid #00ffff !important; }
    </style>
</head>
<body id="b" class="bg-black text-white flex items-center justify-center min-h-screen transition-all duration-700">

    <div id="card" class="text-center p-12 border border-zinc-800 rounded-[4rem] bg-zinc-900/20 shadow-2xl max-w-sm w-full mx-4">
        <div id="p" class="hidden pill-anim mb-8">💊</div>
        <p id="label" class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.4em] mb-4">System Standby</p>
        <p id="m" class="text-4xl font-black italic uppercase leading-none tracking-tighter">Waiting for Dr...</p>
        
        <button onclick="location.reload()" id="ackBtn" class="hidden mt-12 text-zinc-500 text-[9px] font-bold uppercase tracking-widest border border-zinc-800 px-10 py-4 rounded-full hover:text-white hover:border-zinc-500 transition-all">
            Confirm Order ×
        </button>
    </div>

    <script>
        // Configuración de Pusher
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        const channel = pusher.subscribe("test-channel");

        channel.bind('test-event', function(data) {
            // Extraemos el texto (soportando ambos formatos de envío)
            const txt = data.text || data.message;
            if(!txt) return;

            const mainMsg = document.getElementById('m');
            const pill = document.getElementById('p');
            const body = document.getElementById('b');
            const label = document.getElementById('label');
            const btn = document.getElementById('ackBtn');

            // Actualizar interfaz
            mainMsg.innerText = txt;
            mainMsg.className = "text-4xl font-black italic uppercase leading-none text-white animate-pulse";
            label.innerText = "New Clinical Instruction:";
            btn.classList.remove('hidden');
            
            // Lógica de Triage Táctico (Detección de Medicina)
            const isMed = txt.toLowerCase().includes('losartan') || txt.toLowerCase().includes('mg');
            
            if(isMed) {
                body.classList.add('bg-med');
                pill.classList.remove('hidden');
            } else {
                body.classList.remove('bg-med');
                pill.classList.add('hidden');
            }

            // Alerta táctil si el dispositivo lo permite
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
        });
    </script>
</body>
</html>
