 <!DOCTYPE html>
<html>
<head>
    <title>MONTCODE COMMANDER - PACIENTE</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pill-anim { animation: bounce 1s infinite; font-size: 80px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .bg-med { background-color: #001a1a !important; border: 3px solid #00ffff !important; }
    </style>
</head>
<body id="b" class="bg-black text-white flex items-center justify-center min-h-screen transition-all">
    <div class="text-center p-12 border border-zinc-800 rounded-[3rem] bg-zinc-900/20">
        <div id="p" class="hidden pill-anim mb-6">💊</div>
        <p id="m" class="text-3xl font-black italic uppercase">Waiting for Dr...</p>
    </div>

    <script>
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        const channel = pusher.subscribe("test-channel");

        channel.bind('test-event', function(data) {
            const txt = data.text;
            document.getElementById('m').innerText = txt;
            
            // Si el Dr manda medicina, activamos la cápsula
            if(txt.toLowerCase().includes('losartan') || txt.toLowerCase().includes('mg')) {
                document.getElementById('b').classList.add('bg-med');
                document.getElementById('p').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
